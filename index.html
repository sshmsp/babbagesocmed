<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Grade 12 Babbage — Social Media</title>
<meta name="description" content="Official social media pages for Grade 12 Babbage, Engineering Career Pathway." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --green-deep:#0a3d00;
    --green-mid:#2f8f12;
    --green-bright:#54c61e;
    --green-light:#b5e9a5;
    --gold-deep:#6a4300;
    --gold-mid:#c9923f;
    --gold-light:#f0c98a;

    --fb-blue:#1877F2;
    --fb-blue-deep:#0C5DD0;
    --ig-purple:#833AB4;
    --ig-pink:#E1306C;
    --ig-orange:#F77737;
    --ig-yellow:#FCAF45;

    --bg-deep:#0a0f08;
    --bg-deep-2:#15100a;
    --text-main:#f6f4f0;
    --text-muted:rgba(246,244,240,0.66);
    --glass:rgba(255,255,255,0.07);
    --glass-border:rgba(255,255,255,0.14);
    --radius-lg:28px;
    --radius-md:20px;
  }

  *{box-sizing:border-box;}

  html,body{
    margin:0;
    padding:0;
    height:100%;
  }

  body{
    font-family:'Inter', sans-serif;
    color:var(--text-main);
    min-height:100svh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    overflow-x:hidden;
    background:
      radial-gradient(circle at 16% 18%, rgba(84,198,30,0.40), transparent 48%),
      radial-gradient(circle at 84% 14%, rgba(201,146,63,0.30), transparent 50%),
      radial-gradient(circle at 78% 86%, rgba(106,67,0,0.45), transparent 52%),
      radial-gradient(circle at 14% 84%, rgba(47,143,18,0.35), transparent 50%),
      linear-gradient(160deg, var(--bg-deep) 0%, var(--bg-deep-2) 100%);
    background-attachment:fixed;
  }

  .orb{
    position:fixed;
    border-radius:50%;
    filter:blur(70px);
    opacity:0.5;
    pointer-events:none;
    z-index:0;
    will-change:transform;
  }
  .orb-1{
    width:340px;height:340px;
    top:-90px; left:-80px;
    background:radial-gradient(circle, var(--green-bright), transparent 70%);
    animation:drift1 16s ease-in-out infinite;
  }
  .orb-2{
    width:300px;height:300px;
    bottom:-100px; right:-60px;
    background:radial-gradient(circle, var(--gold-mid), transparent 70%);
    animation:drift2 19s ease-in-out infinite;
  }
  .orb-3{
    width:240px;height:240px;
    bottom:10%; left:-60px;
    background:radial-gradient(circle, var(--green-deep), transparent 70%);
    animation:drift3 14s ease-in-out infinite;
  }

  @keyframes drift1{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(40px,30px) scale(1.08); }
  }
  @keyframes drift2{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(-30px,-25px) scale(1.05); }
  }
  @keyframes drift3{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(25px,-20px) scale(1.1); }
  }

  .gear-bg{
    position:fixed;
    top:50%;
    left:50%;
    width:760px;
    height:760px;
    transform:translate(-50%,-50%);
    opacity:0.09;
    z-index:0;
    pointer-events:none;
    animation:spin 70s linear infinite;
  }
  @keyframes spin{
    from{ transform:translate(-50%,-50%) rotate(0deg); }
    to{ transform:translate(-50%,-50%) rotate(360deg); }
  }

  .page{
    position:relative;
    z-index:1;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:32px 20px 24px;
    min-height:100svh;
  }

  .hero{
    width:100%;
    max-width:440px;
    background:var(--glass);
    border:1px solid var(--glass-border);
    backdrop-filter:blur(22px) saturate(140%);
    -webkit-backdrop-filter:blur(22px) saturate(140%);
    border-radius:var(--radius-lg);
    padding:36px 28px 32px;
    text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,0.4), 0 0 60px rgba(84,198,30,0.07);
    opacity:0;
    transform:translateY(18px);
    animation:rise 0.7s cubic-bezier(.2,.8,.2,1) forwards;
  }

  .logo-mark{
    width:84px;
    height:84px;
    margin:0 auto 14px;
    display:block;
    filter:drop-shadow(0 8px 20px rgba(84,198,30,0.35));
    opacity:0;
    animation:rise 0.6s cubic-bezier(.2,.8,.2,1) forwards, float 5s ease-in-out 1.2s infinite;
    animation-delay:0.02s, 1.2s;
  }

  @keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-6px); }
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:7px;
    font-size:11.5px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--text-muted);
    font-weight:600;
    margin-bottom:14px;
    opacity:0;
    animation:rise 0.6s cubic-bezier(.2,.8,.2,1) forwards;
    animation-delay:0.1s;
  }
  .eyebrow .dot{
    width:6px;height:6px;border-radius:50%;
    background:linear-gradient(135deg, var(--green-bright), var(--gold-mid));
    display:inline-block;
  }

  h1{
    font-family:'Plus Jakarta Sans', sans-serif;
    font-weight:800;
    font-size:clamp(28px, 7vw, 36px);
    line-height:1.1;
    margin:0 0 10px;
    letter-spacing:-0.01em;
    background:linear-gradient(95deg, #ffffff 0%, #ffffff 30%, var(--green-bright) 65%, var(--gold-light) 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    opacity:0;
    animation:rise 0.7s cubic-bezier(.2,.8,.2,1) forwards;
    animation-delay:0.16s;
  }

  .subtitle{
    font-size:15px;
    color:var(--text-muted);
    font-weight:500;
    margin:0 0 30px;
    opacity:0;
    animation:rise 0.7s cubic-bezier(.2,.8,.2,1) forwards;
    animation-delay:0.23s;
  }

  .cards{
    display:flex;
    flex-direction:column;
    gap:14px;
  }

  .card{
    position:relative;
    display:flex;
    align-items:center;
    gap:14px;
    text-decoration:none;
    color:var(--text-main);
    background:rgba(255,255,255,0.045);
    border:1px solid var(--glass-border);
    border-radius:var(--radius-md);
    padding:16px 18px;
    text-align:left;
    overflow:hidden;
    cursor:pointer;
    transition:transform 0.28s cubic-bezier(.2,.8,.2,1), box-shadow 0.28s ease, border-color 0.28s ease, background 0.28s ease;
    opacity:0;
    animation:rise 0.7s cubic-bezier(.2,.8,.2,1) forwards;
    -webkit-tap-highlight-color:transparent;
  }
  .card:nth-of-type(1){ animation-delay:0.32s; }
  .card:nth-of-type(2){ animation-delay:0.4s; }

  .card:hover, .card:focus-visible{
    transform:translateY(-3px) scale(1.015);
    background:rgba(255,255,255,0.08);
  }
  .card:active{
    transform:translateY(-1px) scale(0.985);
  }
  .card:focus-visible{
    outline:2px solid rgba(255,255,255,0.85);
    outline-offset:3px;
  }

  .card.fb:hover, .card.fb:focus-visible{
    border-color:rgba(84,198,30,0.55);
    box-shadow:0 10px 34px rgba(47,143,18,0.30);
  }
  .card.ig:hover, .card.ig:focus-visible{
    border-color:rgba(201,146,63,0.55);
    box-shadow:0 10px 34px rgba(201,146,63,0.30);
  }

  .icon-badge{
    flex:0 0 auto;
    width:48px;height:48px;
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 6px 16px rgba(0,0,0,0.25);
  }
  .icon-badge svg{ width:24px; height:24px; display:block; }

  .icon-badge.fb-badge{
    background:linear-gradient(135deg, var(--fb-blue) 0%, var(--fb-blue-deep) 100%);
  }
  .icon-badge.ig-badge{
    background:linear-gradient(135deg, var(--ig-yellow) 0%, var(--ig-orange) 30%, var(--ig-pink) 65%, var(--ig-purple) 100%);
  }

  .card-text{
    display:flex;
    flex-direction:column;
    gap:2px;
    flex:1 1 auto;
    min-width:0;
  }
  .card-label{
    font-family:'Plus Jakarta Sans', sans-serif;
    font-weight:700;
    font-size:15px;
    letter-spacing:-0.01em;
  }
  .card-sub{
    font-size:12.5px;
    color:var(--text-muted);
  }

  .chevron{
    flex:0 0 auto;
    width:18px;height:18px;
    opacity:0.55;
    transition:transform 0.28s ease, opacity 0.28s ease;
  }
  .card:hover .chevron, .card:focus-visible .chevron{
    transform:translateX(3px);
    opacity:0.9;
  }

  footer{
    position:relative;
    z-index:1;
    margin-top:22px;
    font-size:12px;
    color:rgba(246,244,240,0.45);
    text-align:center;
    padding:0 16px;
    opacity:0;
    animation:rise 0.7s cubic-bezier(.2,.8,.2,1) forwards;
    animation-delay:0.52s;
  }

  @keyframes rise{
    from{ opacity:0; transform:translateY(14px); }
    to{ opacity:1; transform:translateY(0); }
  }

  .ripple{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.35);
    transform:scale(0);
    animation:ripple-anim 0.6s ease-out forwards;
    pointer-events:none;
  }
  @keyframes ripple-anim{
    to{ transform:scale(3); opacity:0; }
  }

  @media (min-width:480px){
    .hero{ padding:42px 36px 36px; }
  }

  @media (prefers-reduced-motion: reduce){
    .orb, .gear-bg{ animation:none; }
    .hero, .logo-mark, .eyebrow, h1, .subtitle, .card, footer{
      animation:none;
      opacity:1;
      transform:none;
    }
    .card{ transition:none; }
  }
</style>
</head>

<script>
  document.querySelectorAll('.card').forEach(function(card){
    card.addEventListener('click', function(e){
      var rect = card.getBoundingClientRect();
      var ripple = document.createElement('span');
      var size = Math.max(rect.width, rect.height);
      ripple.className = 'ripple';
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      card.appendChild(ripple);
      setTimeout(function(){ ripple.remove(); }, 650);
    });
  });

  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!reduceMotion && window.matchMedia('(hover: hover)').matches) {
    var orbs = document.querySelectorAll('.orb');
    window.addEventListener('mousemove', function(e){
      var x = (e.clientX / window.innerWidth - 0.5);
      var y = (e.clientY / window.innerHeight - 0.5);
      orbs.forEach(function(orb, i){
        var depth = (i + 1) * 8;
        orb.style.marginLeft = (x * depth) + 'px';
        orb.style.marginTop = (y * depth) + 'px';
      });
    });
  }
</script>
